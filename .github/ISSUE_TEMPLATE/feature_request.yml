name: Feature request
description: Propose a capability or improvement for the self-hosted framework.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        DynUI is a self-hosted, bring-your-own-provider framework. Requests for
        a hosted console, managed model, managed registry, or hosted platform features
        are intentionally out of scope — see the **Project Scope** section of the
        README.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do, and what's getting in the way?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? Consider whether it belongs in core or as an integration example/adapter.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
