name: Bug report
description: Report a defect in a published @dynui/* package or the framework behavior.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. **Do not report security or privacy/consent
        issues here** — see [SECURITY.md](../blob/main/SECURITY.md) for the private
        reporting path.
  - type: input
    id: package
    attributes:
      label: Affected package(s)
      description: e.g. "@dynui/validate", "@dynui/generate"
      placeholder: "@dynui/..."
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Minimal steps, code, or a manifest/tree fixture that reproduces the issue.
      render: shell
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: Generation mode
      description: Is the issue on the deterministic path or a live model path?
      options:
        - Deterministic / heuristic (no model)
        - Live model provider
        - Not applicable
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Node version, OS, and anything else relevant.
    validations:
      required: false
