<svg xmlns="http://www.w3.org/2000/svg" width="640" height="160" viewBox="0 0 640 160" role="img" aria-labelledby="title desc">
  <title id="title">DynUI logo</title>
  <desc id="desc">DynUI wordmark with a component-grid mark.</desc>
  <rect width="640" height="160" rx="24" fill="#0f172a"/>
  <g transform="translate(40 36)">
    <rect x="0" y="0" width="88" height="88" rx="18" fill="#14b8a6"/>
    <rect x="16" y="16" width="24" height="24" rx="6" fill="#f8fafc"/>
    <rect x="48" y="16" width="24" height="24" rx="6" fill="#f8fafc" opacity=".78"/>
    <rect x="16" y="48" width="56" height="24" rx="6" fill="#f8fafc" opacity=".9"/>
  </g>
  <text x="152" y="100" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="70" font-weight="760" letter-spacing="0">DynUI</text>
  <text x="390" y="101" fill="#94a3b8" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="500" letter-spacing="0">validated adaptive UI</text>
</svg>
